name: "Maudslay pass^k check"
description: >-
  Run Maudslay's pass^k reliability math over your agent framework's own trial
  results and (optionally) fail the job below a threshold. Honest scope: this is
  a regression tripwire over SELF-REPORTED results — it cannot detect silent
  corruption. For two-witness outcome verification, see the repository's
  docs/ADOPTING.md.
author: theo-ai-lab
branding:
  icon: "shield"
  color: "gray-dark"

inputs:
  results:
    description: "Path (in your repo) to a maudslay.external-results/1 JSON file."
    required: true
  min-pass-k:
    description: "Optional pass^k floor in [0,1]; the step fails below it. Omit to report only."
    required: false
    default: ""
  out:
    description: "Where to write the import report (never inside runs/)."
    required: false
    default: "maudslay-import-report.json"

outputs:
  pass-k:
    description: "The computed pass^k (0..1) over the supplied results."
    value: ${{ steps.report.outputs.pass-k }}
  report-path:
    description: "Path to the written import report."
    value: ${{ steps.report.outputs.report-path }}

runs:
  using: "composite"
  steps:
    - name: Set up Node 24
      uses: actions/setup-node@v4
      with:
        node-version: "24"
    - name: pass^k report (self-reported provenance)
      id: report
      shell: bash
      # Inputs reach the shell ONLY via env (never ${{ }} inside run:), so a
      # crafted filename cannot inject shell; outputs are CR/LF-rejected before
      # they reach GITHUB_OUTPUT so a crafted path cannot inject extra outputs.
      env:
        IN_RESULTS: ${{ inputs.results }}
        IN_OUT: ${{ inputs.out }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        node "$ACTION_PATH/examples/import/cli.ts" "$IN_RESULTS" --out "$IN_OUT"
        node -e '
          const fs = require("node:fs");
          const out = process.env.IN_OUT;
          if (/[\r\n]/.test(out)) { console.error("out path must not contain newlines"); process.exit(1); }
          const r = JSON.parse(fs.readFileSync(out, "utf8"));
          if (!Number.isFinite(r.report.passK)) { console.error("malformed report"); process.exit(1); }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `pass-k=${r.report.passK}\nreport-path=${out}\n`);
        '
    - name: pass^k threshold
      if: ${{ inputs.min-pass-k != '' }}
      shell: bash
      env:
        IN_OUT: ${{ inputs.out }}
        IN_MIN: ${{ inputs.min-pass-k }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        node "$ACTION_PATH/examples/import/check.ts" "$IN_OUT" --min-pass-k "$IN_MIN"
